# ─── Calibration Worker: cal-agg ───────────────────────────────────────────
# Deployed on SEPARATE CF account for image calibration
# account_id set via CLOUDFLARE_ACCOUNT_ID env var in deploy-calibration.yml
name               = "detectai-cal-agg"
main               = "workers/worker-cal-agg.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev        = true

[[d1_databases]]
binding       = "DB"
database_name = "detectai-calibration"
database_id   = "PLACEHOLDER_NEW_D1_ID"

[vars]
ROLE = "cal-agg"
