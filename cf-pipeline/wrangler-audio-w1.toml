# ─── Audio Pipeline Worker 1 (New CF Account) ──────────────────────────────
# Dedicated to scraping AI audio datasets for audio deepfake detection training
# Uses separate D1 on new account — does NOT share with main pipeline D1
name               = "detectai-audio-w1"
main               = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id         = "b3f69b82379d8d62f6d619124d677ee8"
workers_dev        = true

[[d1_databases]]
binding       = "DB"
database_name = "detectai-audio-pipeline"
database_id   = "PLACEHOLDER_AUDIO_D1_ID"

[triggers]
crons = ["*/1 * * * *"]

[vars]
WORKER_NUM  = "1"
HF_REPO     = "saghi776/detectai-audio-dataset"
AUDIO_ONLY  = "true"
