name: Deploy Cloudflare Pipeline (5 Workers)

on:
  push:
    branches: [main]
    paths:
      - 'cf-pipeline/**'
      - '.github/workflows/deploy-cf-pipeline.yml'
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: 34400e6e147e83e95c942135f54aeba7

jobs:
  deploy:
    name: Deploy CF Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cf-pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cf-pipeline/package-lock.json

      - name: Install deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Deploy 5 pipeline workers + set HF_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          declare -A NAMES
          NAMES["wrangler.toml"]="detectai-pipeline"
          NAMES["wrangler-b.toml"]="detectai-pipeline-b"
          NAMES["wrangler-c.toml"]="detectai-pipeline-c"
          NAMES["wrangler-d.toml"]="detectai-pipeline-d"
          NAMES["wrangler-e.toml"]="detectai-pipeline-e"

          FAILED=0
          for cfg in wrangler.toml wrangler-b.toml wrangler-c.toml wrangler-d.toml wrangler-e.toml; do
            NAME="${NAMES[$cfg]}"
            echo "▶ Deploying $cfg → $NAME"
            if npx wrangler deploy --config "$cfg"; then
              echo "${{ secrets.HUGGINGFACE_API_TOKEN }}" | npx wrangler secret put HF_TOKEN --name "$NAME" || true
              echo "  ✅ $NAME deployed"
            else
              echo "  ❌ $cfg FAILED"
              FAILED=$((FAILED+1))
            fi
          done
          [ "$FAILED" -gt 0 ] && exit 1 || echo "All 5 workers deployed ✅"

      - name: Summary
        run: |
          echo "════════════════════════════════════════"
          echo "  detectai-pipeline   → scraper (W1)"
          echo "  detectai-pipeline-b → scraper (W2)"
          echo "  detectai-pipeline-c → scraper (W3)"
          echo "  detectai-pipeline-d → scraper (W4)"
          echo "  detectai-pipeline-e → HF push (W20)"
          echo "  Status: https://detectai-pipeline.workers.dev/status"
          echo "════════════════════════════════════════"
