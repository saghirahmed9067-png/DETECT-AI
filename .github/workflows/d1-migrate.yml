name: D1 Schema Migration

on:
  workflow_dispatch:   # manual trigger from GitHub Actions UI
  push:
    paths:
      - 'cf-pipeline/src/db/*.sql'  # auto-run when SQL files change

jobs:
  migrate:
    runs-on: ubuntu-latest
    name: Apply D1 schema migrations
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@^4.71.0

      - name: Run feedback-schema.sql migration
        working-directory: cf-pipeline
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 34400e6e147e83e95c942135f54aeba7
        run: |
          npx wrangler d1 execute detectai-pipeline \
            --file=src/db/feedback-schema.sql \
            --remote
          echo "✅ D1 schema migration complete"
