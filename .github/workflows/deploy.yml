name: 🚀 Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify Build
        run: |
          curl -s -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}"
          echo "✅ Netlify build triggered — check https://app.netlify.com/projects/detectai-platform/deploys"
