name: 🚀 Deploy All Sites

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Main site: trigger Netlify build hook
  deploy-main:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Main Site Build
        run: |
          curl -s -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}"
          echo "✅ Main site build triggered → https://detectai-platform.netlify.app"

  # Admin panel: build from admin/ subdirectory and deploy
  deploy-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@latest

      - name: Deploy Admin Panel
        working-directory: admin
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: c17c17c4-bf23-4100-8754-a7792dca32cb
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          HUGGINGFACE_API_TOKEN: ${{ secrets.HUGGINGFACE_API_TOKEN }}
          HF_DATASET_REPO: saghi776/detectai-dataset
        run: |
          netlify deploy --build --prod \
            --auth="$NETLIFY_AUTH_TOKEN" \
            --site="$NETLIFY_SITE_ID" \
            --message="Admin panel deploy $(date +%Y-%m-%d)"
          echo "✅ Admin panel deployed → https://detectai-admin-panel.netlify.app"
