name: Update HF Token on All 20 Workers

on:
  workflow_dispatch:

jobs:
  update-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler v4
        run: npm install -g wrangler@latest

      - name: Push HF_TOKEN to all 20 workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 34400e6e147e83e95c942135f54aeba7
        run: |
          HF_VALUE="${{ secrets.HUGGINGFACE_API_TOKEN }}"

          WORKERS=(
            "detectai-pipeline"      "detectai-pipeline-w2"
            "detectai-pipeline-w3"   "detectai-pipeline-w4"
            "detectai-pipeline-w5"   "detectai-pipeline-w6"
            "detectai-pipeline-w7"   "detectai-pipeline-w8"
            "detectai-pipeline-w9"   "detectai-pipeline-w10"
            "detectai-pipeline-w11"  "detectai-pipeline-w12"
            "detectai-pipeline-w13"  "detectai-pipeline-w14"
            "detectai-pipeline-w15"  "detectai-pipeline-w16"
            "detectai-pipeline-w17"  "detectai-pipeline-w18"
            "detectai-pipeline-w19"  "detectai-pipeline-w20"
          )

          SUCCESS=0
          FAILED=0

          for WORKER in "${WORKERS[@]}"; do
            echo -n "  $WORKER ... "
            if echo "$HF_VALUE" | wrangler secret put HF_TOKEN --name "$WORKER" 2>&1; then
              echo "  ✅ done"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "  ❌ failed"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "Result: $SUCCESS success, $FAILED failed"
          [ "$FAILED" -gt 0 ] && exit 1 || echo "All workers updated!"

      - name: Verify workers alive
        run: |
          sleep 5
          for WORKER in detectai-pipeline detectai-pipeline-w2 detectai-pipeline-w20; do
            echo -n "$WORKER: "
            curl -sf --max-time 10 "https://${WORKER}.workers.dev/health" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print('alive —', d.get('role','?'))" \
              2>/dev/null || echo "OFFLINE"
          done
