name: Update HF Token on All Workers

on:
  workflow_dispatch:

jobs:
  update-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g wrangler@latest

      - name: Push HF_TOKEN to all 5 deployed workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 34400e6e147e83e95c942135f54aeba7
        run: |
          HF="${{ secrets.HUGGINGFACE_API_TOKEN }}"
          WORKERS=(detectai-pipeline detectai-pipeline-b detectai-pipeline-c detectai-pipeline-d detectai-pipeline-e)
          OK=0; FAIL=0
          for W in "${WORKERS[@]}"; do
            echo -n "  $W ... "
            if echo "$HF" | wrangler secret put HF_TOKEN --name "$W" 2>&1 | tail -1; then
              OK=$((OK+1))
            else
              FAIL=$((FAIL+1))
            fi
          done
          echo "Done: $OK ✅  $FAIL ❌"
          [ "$FAIL" -gt 0 ] && exit 1 || true

      - name: Health check
        run: |
          sleep 5
          for W in detectai-pipeline detectai-pipeline-b detectai-pipeline-e; do
            echo -n "  $W: "
            curl -sf --max-time 10 "https://${W}.workers.dev/health" \
              | python3 -c "import json,sys;d=json.load(sys.stdin);print('✅',d.get('role','?'))" \
              2>/dev/null || echo "⚠️ unreachable"
          done
