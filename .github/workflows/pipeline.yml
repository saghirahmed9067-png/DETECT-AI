name: 🤖 Pipeline Runner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-pipeline:
    name: 🔄 Execute via Edge Function
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase Orchestrator
        run: |
          echo "Triggering orchestrator..."
          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/functions/v1/pipeline-orchestrator" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"source":"github_actions"}' --max-time 300)
          HTTP=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | head -n -1)
          echo "HTTP: $HTTP"
          echo "$BODY" | python3 -c "
import json,sys
d=json.load(sys.stdin)
print('Jobs:', len(d.get('results',{})))
for l in d.get('log',[])[-15:]: print(' ',l)
" 2>/dev/null || echo "$BODY"

      - name: Trigger HF Push
        run: |
          curl -s -X POST \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/functions/v1/hf-push" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"source":"github_actions"}' --max-time 120 | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print(f'HF pushed: {d.get(\"pushed\",0)} items')" 2>/dev/null
