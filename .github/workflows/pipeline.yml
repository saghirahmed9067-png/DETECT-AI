name: Pipeline Scheduler
on:
  schedule:
    - cron: '0 */6 * * *'   # Scrape every 6h
    - cron: '0 1 * * *'     # Clean + dedupe daily  
    - cron: '0 2 * * 1'     # Retrain weekly
  workflow_dispatch:
    inputs:
      job:
        description: 'Job type (scrape/clean/dedupe/upload)'
        required: true
        default: 'scrape'
        type: choice
        options: [scrape, clean, dedupe, upload]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pipeline/package-lock.json

      - name: Install dependencies
        working-directory: pipeline
        run: npm ci --prefer-offline || npm install
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN:            ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO:     ${{ secrets.HF_DATASET_REPO }}
          HF_MODEL_REPO:       ${{ secrets.HF_MODEL_REPO }}

      - name: Run scraper
        if: github.event.schedule == '0 */6 * * *' || github.event.inputs.job == 'scrape'
        working-directory: pipeline
        run: node src/workers/scraper.js
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN:            ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO:     ${{ secrets.HF_DATASET_REPO }}

      - name: Run cleaner + deduplicator
        if: github.event.schedule == '0 1 * * *' || github.event.inputs.job == 'clean'
        working-directory: pipeline
        run: node src/workers/cleaner.js && node src/workers/deduplicator.js
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Run uploader
        if: github.event.inputs.job == 'upload'
        working-directory: pipeline
        run: node src/workers/uploader.js
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN:            ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO:     ${{ secrets.HF_DATASET_REPO }}
