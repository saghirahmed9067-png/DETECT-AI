name: 🤖 DETECTAI Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'   # every 6h as backup to pg_cron

jobs:
  run-pipeline:
    name: Run orchestrator + HF push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🔄 Trigger Orchestrator
        run: |
          echo "=== Triggering pipeline orchestrator ==="
          RESP=$(curl -sf -X POST \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/functions/v1/pipeline-orchestrator" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"source":"github_actions"}' \
            --max-time 120) || { echo "Orchestrator call failed"; exit 1; }
          echo "$RESP" | python3 -c "
import json,sys
d=json.load(sys.stdin)
print(f'OK={d.get(\"ok\")} Jobs={d.get(\"jobs\")} Time={d.get(\"ms\")}ms')
for l in (d.get('log') or [])[-20:]: print(' ', l)
" 2>/dev/null || echo "$RESP" | head -c 500

      - name: 📤 Trigger HF Push
        run: |
          echo "=== Pushing to HuggingFace ==="
          RESP=$(curl -sf -X POST \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/functions/v1/hf-push" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"source":"github_actions"}' \
            --max-time 120) || { echo "HF push call failed"; exit 1; }
          echo "$RESP" | python3 -c "
import json,sys
d=json.load(sys.stdin)
print(f'Pushed={d.get(\"pushed\")} CommitID={d.get(\"commitId\")}')
print(f'Dataset URL: {d.get(\"url\")}')
for l in (d.get('log') or [])[-10:]: print(' ', l)
" 2>/dev/null || echo "$RESP" | head -c 500
