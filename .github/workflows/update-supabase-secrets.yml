name: Update Supabase Env Vars on Vercel

on:
  workflow_dispatch:

# Run this if you rotate Supabase keys and need to push them to Vercel env vars.
# Requires secrets: VERCEL_TOKEN, VERCEL_PROJECT_ID, VERCEL_ORG_ID,
#                   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY

jobs:
  update-vercel-env:
    runs-on: ubuntu-latest
    steps:
      - name: Update SUPABASE_URL on Vercel
        run: |
          curl -s -X DELETE \
            "https://api.vercel.com/v10/projects/${{ secrets.VERCEL_PROJECT_ID }}/env?key=NEXT_PUBLIC_SUPABASE_URL&teamId=${{ secrets.VERCEL_ORG_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" || true
          curl -s -X POST \
            "https://api.vercel.com/v10/projects/${{ secrets.VERCEL_PROJECT_ID }}/env?teamId=${{ secrets.VERCEL_ORG_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"NEXT_PUBLIC_SUPABASE_URL\",\"value\":\"${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}"

      - name: Update SUPABASE_ANON_KEY on Vercel
        run: |
          curl -s -X DELETE \
            "https://api.vercel.com/v10/projects/${{ secrets.VERCEL_PROJECT_ID }}/env?key=NEXT_PUBLIC_SUPABASE_ANON_KEY&teamId=${{ secrets.VERCEL_ORG_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" || true
          curl -s -X POST \
            "https://api.vercel.com/v10/projects/${{ secrets.VERCEL_PROJECT_ID }}/env?teamId=${{ secrets.VERCEL_ORG_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"NEXT_PUBLIC_SUPABASE_ANON_KEY\",\"value\":\"${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}"

      - name: Confirm update
        run: echo "✅ Supabase env vars updated on Vercel — redeploy from dashboard or push a commit to apply"
