name: Update Supabase Env Vars on Vercel

on:
  workflow_dispatch:

jobs:
  update-vercel-env:
    runs-on: ubuntu-latest
    steps:
      - name: Update Vercel env - SUPABASE_URL
        run: |
          # Delete old
          curl -s -X DELETE "https://api.vercel.com/v10/projects/${{ secrets.VERCEL_PROJECT_ID }}/env?key=NEXT_PUBLIC_SUPABASE_URL&teamId=${{ secrets.VERCEL_ORG_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" || true
          # Create new
          curl -s -X POST "https://api.vercel.com/v10/projects/${{ secrets.VERCEL_PROJECT_ID }}/env?teamId=${{ secrets.VERCEL_ORG_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"key":"NEXT_PUBLIC_SUPABASE_URL","value":"https://lpgzmruxaeikxxayjmze.supabase.co","type":"plain","target":["production","preview","development"]}'

      - name: Update Vercel env - SUPABASE_ANON_KEY
        run: |
          curl -s -X DELETE "https://api.vercel.com/v10/projects/${{ secrets.VERCEL_PROJECT_ID }}/env?key=NEXT_PUBLIC_SUPABASE_ANON_KEY&teamId=${{ secrets.VERCEL_ORG_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" || true
          curl -s -X POST "https://api.vercel.com/v10/projects/${{ secrets.VERCEL_PROJECT_ID }}/env?teamId=${{ secrets.VERCEL_ORG_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"key":"NEXT_PUBLIC_SUPABASE_ANON_KEY","value":"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxwZ3ptcnV4YWVpa3h4YXlqbXplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjE4OTIsImV4cCI6MjA4ODczNzg5Mn0.grbICfJk6vvJjLtcHecuA6X10kDwbaSFAejNHkvv2w0","type":"plain","target":["production","preview","development"]}'

      - name: Trigger Vercel redeploy
        run: |
          curl -s -X POST "https://api.vercel.com/v13/deployments?teamId=${{ secrets.VERCEL_ORG_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"detect-ai","gitSource":{"type":"github","repoId":"","ref":"main"},"projectId":"${{ secrets.VERCEL_PROJECT_ID }}"}'
