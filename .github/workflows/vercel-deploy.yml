name: 🚀 Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_sUVHUcrNUc6fWYVOF1cpD1Z1
          vercel-project-id: prj_AeOP4rCryZnSzqfUYRC2M62AZRbT
          vercel-args: '--prod'
