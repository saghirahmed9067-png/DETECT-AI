name: Deploy DETECTAI Pipeline (All 5 Workers)

on:
  push:
    branches: [main]
    paths:
      - 'cf-pipeline/**'        # Only runs when pipeline code changes
  workflow_dispatch:             # Also allows manual trigger from GitHub UI

jobs:
  deploy-workers:
    name: Deploy Workers A–E to Cloudflare
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cf-pipeline

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cf-pipeline/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ── Worker A (shards 0–9) ──────────────────────────────────────────────
      - name: Deploy Worker A (shards 0–9)
        run: npx wrangler deploy --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set HF_TOKEN secret on Worker A
        run: echo "$HF_TOKEN" | npx wrangler secret put HF_TOKEN --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      # ── Worker B (shards 10–19) ────────────────────────────────────────────
      - name: Deploy Worker B (shards 10–19)
        run: npx wrangler deploy --config wrangler-b.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set HF_TOKEN secret on Worker B
        run: echo "$HF_TOKEN" | npx wrangler secret put HF_TOKEN --config wrangler-b.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      # ── Worker C (shards 20–29) ────────────────────────────────────────────
      - name: Deploy Worker C (shards 20–29)
        run: npx wrangler deploy --config wrangler-c.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set HF_TOKEN secret on Worker C
        run: echo "$HF_TOKEN" | npx wrangler secret put HF_TOKEN --config wrangler-c.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      # ── Worker D (shards 30–39) ────────────────────────────────────────────
      - name: Deploy Worker D (shards 30–39)
        run: npx wrangler deploy --config wrangler-d.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set HF_TOKEN secret on Worker D
        run: echo "$HF_TOKEN" | npx wrangler secret put HF_TOKEN --config wrangler-d.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      # ── Worker E (shards 40–49 + HF Push) ─────────────────────────────────
      - name: Deploy Worker E (shards 40–49 + HF push)
        run: npx wrangler deploy --config wrangler-e.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set HF_TOKEN secret on Worker E
        run: echo "$HF_TOKEN" | npx wrangler secret put HF_TOKEN --config wrangler-e.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Deployment Summary
        run: |
          echo "✅ All 5 workers deployed successfully!"
          echo ""
          echo "Workers:"
          echo "  detectai-pipeline   → shards 0–9    (*/1 cron)"
          echo "  detectai-pipeline-b → shards 10–19  (*/1 cron)"
          echo "  detectai-pipeline-c → shards 20–29  (*/1 cron)"
          echo "  detectai-pipeline-d → shards 30–39  (*/1 cron)"
          echo "  detectai-pipeline-e → shards 40–49  (*/1 + */10 cron)"
          echo ""
          echo "Expected throughput: ~5,760,000 items/day"
          echo "Status: https://detectai-pipeline.workers.dev/status"
